<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#EEF2FF"/>
  <defs>
    <radialGradient id="hubglow"><stop offset="0%" stop-color="#4338CA" stop-opacity="0.2"/><stop offset="100%" stop-color="#4338CA" stop-opacity="0"/></radialGradient>
    <filter id="screen-glow"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect x="50" y="50" width="1500" height="800" rx="40" fill="url(#hubglow)"/>
  <!-- Central hub control desk -->
  <rect x="400" y="650" width="800" height="40" rx="6" fill="#D4C9B3"/>
  <rect x="420" y="690" width="760" height="210" rx="4" fill="#E8DFCC"/>
  <!-- Central joystick -->
  <rect x="760" y="580" width="80" height="70" rx="10" fill="#4338CA"/>
  <rect x="775" y="540" width="50" height="50" rx="25" fill="#F97316"/>
  <circle cx="800" cy="565" r="15" fill="#F97316" filter="url(#screen-glow)"/>
  
  <!-- Screen badges - ChatGPT -->
  <rect x="100" y="200" width="200" height="140" rx="12" fill="white" stroke="#4338CA" stroke-width="2" filter="url(#screen-glow)"/>
  <rect x="100" y="200" width="200" height="30" rx="12" fill="#4338CA"/>
  <text x="145" y="220" fill="white" font-size="13" font-family="Arial" font-weight="bold">ChatGPT</text>
  <rect x="115" y="240" width="170" height="8" rx="4" fill="#E5E7EB"/>
  <rect x="115" y="256" width="150" height="8" rx="4" fill="#E5E7EB"/>
  <rect x="115" y="272" width="160" height="8" rx="4" fill="#E5E7EB"/>
  <rect x="115" y="296" width="80" height="24" rx="12" fill="#34D399"/>
  <text x="123" y="312" fill="white" font-size="10" font-family="Arial">Optimized</text>
  
  <!-- Screen - Claude -->
  <rect x="350" y="180" width="200" height="140" rx="12" fill="white" stroke="#F97316" stroke-width="2" filter="url(#screen-glow)"/>
  <rect x="350" y="180" width="200" height="30" rx="12" fill="#F97316"/>
  <text x="400" y="200" fill="white" font-size="13" font-family="Arial" font-weight="bold">Claude</text>
  <rect x="365" y="220" width="170" height="8" rx="4" fill="#E5E7EB"/>
  <rect x="365" y="236" width="155" height="8" rx="4" fill="#E5E7EB"/>
  <rect x="365" y="276" width="80" height="24" rx="12" fill="#34D399"/>
  <text x="373" y="292" fill="white" font-size="10" font-family="Arial">Ready</text>
  
  <!-- Screen - Gemini -->
  <rect x="600" y="170" width="200" height="140" rx="12" fill="white" stroke="#4338CA" stroke-width="2" filter="url(#screen-glow)"/>
  <rect x="600" y="170" width="200" height="30" rx="12" fill="#4338CA"/>
  <text x="645" y="190" fill="white" font-size="13" font-family="Arial" font-weight="bold">Gemini</text>
  <rect x="615" y="210" width="170" height="8" rx="4" fill="#E5E7EB"/>
  <rect x="615" y="226" width="140" height="8" rx="4" fill="#E5E7EB"/>
  <rect x="615" y="266" width="80" height="24" rx="12" fill="#34D399"/>
  <text x="623" y="282" fill="white" font-size="10" font-family="Arial">Live</text>
  
  <!-- Screen - Lovable -->
  <rect x="850" y="180" width="200" height="140" rx="12" fill="white" stroke="#F97316" stroke-width="2" filter="url(#screen-glow)"/>
  <rect x="850" y="180" width="200" height="30" rx="12" fill="#F97316"/>
  <text x="890" y="200" fill="white" font-size="13" font-family="Arial" font-weight="bold">Cursor</text>
  <rect x="865" y="220" width="170" height="8" rx="4" fill="#E5E7EB"/>
  <rect x="865" y="236" width="130" height="8" rx="4" fill="#E5E7EB"/>
  <rect x="865" y="276" width="80" height="24" rx="12" fill="#34D399"/>
  <text x="873" y="292" fill="white" font-size="10" font-family="Arial">Ready</text>

  <!-- Screen - Replit -->
  <rect x="1100" y="200" width="200" height="140" rx="12" fill="white" stroke="#4338CA" stroke-width="2" filter="url(#screen-glow)"/>
  <rect x="1100" y="200" width="200" height="30" rx="12" fill="#4338CA"/>
  <text x="1145" y="220" fill="white" font-size="13" font-family="Arial" font-weight="bold">Replit</text>
  <rect x="1115" y="240" width="170" height="8" rx="4" fill="#E5E7EB"/>
  <rect x="1115" y="256" width="155" height="8" rx="4" fill="#E5E7EB"/>
  <rect x="1115" y="296" width="80" height="24" rx="12" fill="#34D399"/>
  <text x="1123" y="312" fill="white" font-size="10" font-family="Arial">Connected</text>
  
  <!-- Connection arcs from joystick to screens -->
  <path d="M800 565 Q450 400 200 270" fill="none" stroke="#4338CA" stroke-width="2" stroke-dasharray="6 6" opacity="0.6"/>
  <path d="M800 565 Q650 380 450 250" fill="none" stroke="#4338CA" stroke-width="2" stroke-dasharray="6 6" opacity="0.6"/>
  <path d="M800 565 Q800 350 700 240" fill="none" stroke="#4338CA" stroke-width="2" stroke-dasharray="6 6" opacity="0.6"/>
  <path d="M800 565 Q950 380 950 250" fill="none" stroke="#4338CA" stroke-width="2" stroke-dasharray="6 6" opacity="0.6"/>
  <path d="M800 565 Q1100 400 1200 270" fill="none" stroke="#4338CA" stroke-width="2" stroke-dasharray="6 6" opacity="0.6"/>
  
  <!-- Data packets flowing on lines -->
  <circle r="6" fill="#F97316" opacity="0.8">
    <animateMotion dur="3s" repeatCount="indefinite" path="M800 565 Q450 400 200 270"/>
  </circle>
  <circle r="6" fill="#34D399" opacity="0.8">
    <animateMotion dur="3.5s" repeatCount="indefinite" path="M800 565 Q800 350 700 240"/>
  </circle>
  <circle r="6" fill="#FCD34D" opacity="0.8">
    <animateMotion dur="4s" repeatCount="indefinite" path="M800 565 Q1100 400 1200 270"/>
  </circle>
</svg>