<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#F8F4ED"/>
  <defs>
    <radialGradient id="card-glow"><stop offset="0%" stop-color="#4338CA" stop-opacity="0.3"/><stop offset="100%" stop-color="#4338CA" stop-opacity="0"/></radialGradient>
    <linearGradient id="card-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="white"/><stop offset="100%" stop-color="#EEF2FF"/>
    </linearGradient>
    <filter id="card-shadow"><feDropShadow dx="0" dy="16" stdDeviation="32" flood-color="#4338CA" flood-opacity="0.2"/></filter>
  </defs>
  <rect x="50" y="50" width="1500" height="800" rx="40" fill="url(#card-glow)"/>
  
  <!-- Giant prompt card -->
  <rect x="250" y="120" width="1100" height="660" rx="32" fill="url(#card-bg)" stroke="#4338CA" stroke-width="3" filter="url(#card-shadow)">
    <animateTransform attributeName="transform" type="translate" values="0,-10;0,10;0,-10" dur="6s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Card header -->
  <rect x="250" y="120" width="1100" height="70" rx="32" fill="#4338CA"/>
  <rect x="250" y="150" width="1100" height="40" fill="#4338CA"/>
  <text x="560" y="166" fill="white" font-size="24" font-family="Arial" font-weight="bold">✨ Optimized Prompt</text>
  
  <!-- Card body content -->
  <rect x="300" y="220" width="100" height="30" rx="15" fill="#EEF2FF"/>
  <text x="310" y="240" fill="#4338CA" font-size="12" font-family="Arial" font-weight="bold">Role</text>
  <rect x="410" y="222" width="500" height="26" rx="4" fill="#F3F4F6"/>
  <text x="420" y="240" fill="#6B7280" font-size="12" font-family="Arial">You are an expert marketing copywriter...</text>
  
  <rect x="300" y="270" width="120" height="30" rx="15" fill="#EEF2FF"/>
  <text x="310" y="290" fill="#4338CA" font-size="12" font-family="Arial" font-weight="bold">Context</text>
  <rect x="430" y="272" width="870" height="50" rx="4" fill="#F3F4F6"/>
  <text x="440" y="290" fill="#6B7280" font-size="12" font-family="Arial">A SaaS platform that converts simple text into optimized prompts...</text>
  <text x="440" y="308" fill="#6B7280" font-size="12" font-family="Arial">Target audience: content creators and marketers...</text>
  
  <rect x="300" y="340" width="100" height="30" rx="15" fill="#EEF2FF"/>
  <text x="310" y="360" fill="#4338CA" font-size="12" font-family="Arial" font-weight="bold">Task</text>
  <rect x="410" y="342" width="890" height="26" rx="4" fill="#F3F4F6"/>
  <text x="420" y="360" fill="#6B7280" font-size="12" font-family="Arial">Write a compelling landing page headline for Prompt Generator...</text>
  
  <!-- Output box -->
  <rect x="300" y="400" width="1000" height="180" rx="12" fill="#4338CA" opacity="0.05"/>
  <rect x="300" y="400" width="1000" height="30" rx="12" fill="#4338CA" opacity="0.1"/>
  <text x="330" y="420" fill="#4338CA" font-size="13" font-family="Arial" font-weight="bold">📝 Output</text>
  <text x="330" y="460" fill="#1E1B4B" font-size="16" font-family="Arial" font-weight="bold">"Write Once. Prompt Anywhere."</text>
  <text x="330" y="490" fill="#1E1B4B" font-size="14" font-family="Arial">Generate high-quality, structured prompts across all major AI</text>
  <text x="330" y="510" fill="#1E1B4B" font-size="14" font-family="Arial">platforms with a single click. No more guesswork.</text>
  <text x="330" y="540" fill="#6B7280" font-size="12" font-family="Arial">✓ Optimized for ChatGPT, Claude, Gemini, Llama, Mistral...</text>
  
  <!-- Target model badges -->
  <rect x="330" y="600" width="100" height="30" rx="15" fill="#EEF2FF"/>
  <text x="345" y="620" fill="#4338CA" font-size="11" font-family="Arial">ChatGPT</text>
  <rect x="445" y="600" width="80" height="30" rx="15" fill="#EEF2FF"/>
  <text x="458" y="620" fill="#4338CA" font-size="11" font-family="Arial">Claude</text>
  <rect x="540" y="600" width="90" height="30" rx="15" fill="#EEF2FF"/>
  <text x="555" y="620" fill="#4338CA" font-size="11" font-family="Arial">Gemini</text>
  <rect x="645" y="600" width="90" height="30" rx="15" fill="#EEF2FF"/>
  <text x="660" y="620" fill="#4338CA" font-size="11" font-family="Arial">Lovable</text>
  <rect x="750" y="600" width="70" height="30" rx="15" fill="#EEF2FF"/>
  <text x="765" y="620" fill="#4338CA" font-size="11" font-family="Arial">Bolt</text>
  <rect x="835" y="600" width="80" height="30" rx="15" fill="#EEF2FF"/>
  <text x="848" y="620" fill="#4338CA" font-size="11" font-family="Arial">Replit</text>
  <rect x="930" y="600" width="80" height="30" rx="15" fill="#EEF2FF"/>
  <text x="943" y="620" fill="#4338CA" font-size="11" font-family="Arial">Cursor</text>
  
  <!-- CTA Button -->
  <rect x="450" y="670" width="300" height="60" rx="30" fill="#F97316" filter="url(#card-shadow)"/>
  <text x="505" y="706" fill="white" font-size="22" font-family="Arial" font-weight="bold">Copy Prompt ✨</text>
  
  <!-- Floating small sparks -->
  <circle cx="350" cy="200" r="3" fill="#F97316" opacity="0.6"><animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/></circle>
  <circle cx="1200" cy="250" r="4" fill="#4338CA" opacity="0.5"><animate attributeName="opacity" values="0;0.8;0" dur="2.5s" repeatCount="indefinite"/></circle>
  <circle cx="400" cy="700" r="3" fill="#FCD34D" opacity="0.7"><animate attributeName="opacity" values="0;0.7;0" dur="1.8s" repeatCount="indefinite"/></circle>
</svg>