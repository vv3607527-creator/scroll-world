<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#EEF2FF"/>
  <defs>
    <radialGradient id="glow"><stop offset="0%" stop-color="#4338CA" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#4338CA" stop-opacity="0"/></radialGradient>
  </defs>
  <rect x="100" y="100" width="1400" height="700" rx="60" fill="url(#glow)"/>
  <!-- Glowing text box -->
  <rect x="300" y="280" width="1000" height="200" rx="20" fill="white" stroke="#4338CA" stroke-width="3" filter="url(#shadow)"/>
  <text x="340" y="340" fill="#9CA3AF" font-size="28" font-family="Arial" font-style="italic">Type your idea here...</text>
  <rect x="1150" y="310" width="100" height="140" rx="70" fill="#F97316"/>
  <text x="1175" y="390" fill="white" font-size="40" font-family="Arial" font-weight="bold">→</text>
  <!-- Spark particles -->
  <circle cx="480" cy="260" r="4" fill="#F97316" opacity="0.8"><animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/></circle>
  <circle cx="650" cy="240" r="3" fill="#FCD34D" opacity="0.7"><animate attributeName="opacity" values="0;0.8;0" dur="1.5s" repeatCount="indefinite"/></circle>
  <circle cx="820" cy="255" r="5" fill="#4338CA" opacity="0.6"><animate attributeName="opacity" values="0;0.7;0" dur="2.5s" repeatCount="indefinite"/></circle>
  <circle cx="550" cy="530" r="3" fill="#F97316" opacity="0.5"><animate attributeName="opacity" values="0;0.6;0" dur="1.8s" repeatCount="indefinite"/></circle>
  <circle cx="750" cy="545" r="4" fill="#FCD34D" opacity="0.6"><animate attributeName="opacity" values="0;0.8;0" dur="2.2s" repeatCount="indefinite"/></circle>
  <circle cx="920" cy="520" r="3" fill="#4338CA" opacity="0.5"><animate attributeName="opacity" values="0;0.6;0" dur="1.6s" repeatCount="indefinite"/></circle>
  <!-- Model icons floating -->
  <rect x="200" y="500" width="100" height="30" rx="15" fill="#4338CA" opacity="0.8"/>
  <text x="215" y="520" fill="white" font-size="12" font-family="Arial">ChatGPT</text>
  <rect x="350" y="520" width="80" height="30" rx="15" fill="#1E1B4B" opacity="0.8"/>
  <text x="360" y="540" fill="white" font-size="12" font-family="Arial">Claude</text>
  <rect x="480" y="505" width="90" height="30" rx="15" fill="#F97316" opacity="0.8"/>
  <text x="495" y="525" fill="white" font-size="12" font-family="Arial">Gemini</text>
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#4338CA" flood-opacity="0.15"/></filter>
  </defs>
</svg>