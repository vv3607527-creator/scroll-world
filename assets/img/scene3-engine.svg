<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#F8F4ED"/>
  <defs>
    <linearGradient id="conveyor" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4338CA"/><stop offset="50%" stop-color="#4338CA"/><stop offset="51%" stop-color="#1E1B4B"/><stop offset="100%" stop-color="#1E1B4B"/>
      <animate attributeName="x1" values="0;1" dur="3s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="inner-glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- Factory walls -->
  <rect x="0" y="400" width="1600" height="500" fill="#E8DFCC"/>
  <rect x="0" y="400" width="1600" height="8" fill="#D4C9B3"/>
  <!-- Conveyor belt -->
  <rect x="150" y="520" width="1300" height="30" rx="15" fill="#4338CA"/>
  <circle cx="200" cy="535" r="20" fill="#3730A3"/>
  <circle cx="400" cy="535" r="20" fill="#3730A3"/>
  <circle cx="600" cy="535" r="20" fill="#3730A3"/>
  <circle cx="800" cy="535" r="20" fill="#3730A3"/>
  <circle cx="1000" cy="535" r="20" fill="#3730A3"/>
  <circle cx="1200" cy="535" r="20" fill="#3730A3"/>
  <circle cx="1400" cy="535" r="20" fill="#3730A3"/>
  
  <!-- Raw text notes going in -->
  <rect x="180" y="440" width="80" height="60" rx="4" fill="#FCD34D" transform="rotate(-5 220 470)">
    <animateTransform attributeName="transform" type="translate" values="0,0;30,0" dur="4s" repeatCount="indefinite"/>
  </rect>
  <rect x="290" y="450" width="80" height="60" rx="4" fill="#34D399" transform="rotate(3 330 480)">
    <animateTransform attributeName="transform" type="translate" values="0,0;30,0" dur="4s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Gear cogs -->
  <g filter="url(#inner-glow)">
    <circle cx="700" cy="300" r="80" fill="none" stroke="#4338CA" stroke-width="3" opacity="0.5">
      <animateTransform attributeName="transform" type="rotate" from="0 700 300" to="360 700 300" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="300" r="60" fill="none" stroke="#4338CA" stroke-width="2" opacity="0.4"/>
    <circle cx="700" cy="300" r="12" fill="#4338CA"/>
    <circle cx="850" cy="250" r="50" fill="none" stroke="#F97316" stroke-width="3" opacity="0.5">
      <animateTransform attributeName="transform" type="rotate" from="360 850 250" to="0 850 250" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="850" cy="250" r="36" fill="none" stroke="#F97316" stroke-width="2" opacity="0.4"/>
    <circle cx="850" cy="250" r="8" fill="#F97316"/>
  </g>
  
  <!-- Structured prompts coming out -->
  <rect x="1000" y="440" width="100" height="70" rx="6" fill="white" stroke="#4338CA" stroke-width="2" filter="url(#inner-glow)">
    <animateTransform attributeName="transform" type="translate" values="0,0;-40,0" dur="4s" repeatCount="indefinite"/>
  </rect>
  <rect x="1150" y="430" width="100" height="70" rx="6" fill="white" stroke="#4338CA" stroke-width="2" filter="url(#inner-glow)">
    <animateTransform attributeName="transform" type="translate" values="0,0;-40,0" dur="4s" repeatCount="indefinite"/>
  </rect>
  <text x="1015" y="470" fill="#4338CA" font-size="9" font-family="Arial">Optimized.</text>
  <text x="1165" y="460" fill="#4338CA" font-size="9" font-family="Arial">Structured.</text>
  
  <!-- Pipeline pipes -->
  <path d="M300 200 Q300 150 500 150 Q700 150 700 220" fill="none" stroke="#4338CA" stroke-width="8" opacity="0.3"/>
  <path d="M700 220 Q700 300 900 300 Q1100 300 1100 400" fill="none" stroke="#F97316" stroke-width="6" opacity="0.3"/>
</svg>